    #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; z-index: 10000; }

    #pinnedVideoPlayer {

    .connection-status {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(0,0,0,0.7);

    .connection-status.connected { background: rgba(40, 167, 69, 0.8); }
    .connection-status.disconnected { background: rgba(220, 53, 69, 0.8); }

    @keyframes fadeInOut {

    .video-js.vjs-netflix-theme { background-color: #000; }

    .vjs-netflix-theme .vjs-volume-panel, .vjs-netflix-theme .vjs-fullscreen-control { margin-right: 1em; }
    .video-js.vjs-netflix-theme.vjs-has-started.vjs-user-inactive .vjs-control-bar { opacity: 0; visibility: hidden; }

    .video-selector-bar { display: flex; gap: 6px; padding: 8px; background: #111; overflow-x: auto; border-bottom: 1px solid #333; max-height: 60px; }
    .video-selector-btn { flex-shrink: 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 6px 10px; cursor: pointer; font-size: 12px; font-family: 'Tajawal', sans-serif; transition: all 0.2s; }
    .video-selector-btn:hover { background: #333; border-color: #666; }
    .video-selector-btn.active { background: #e50914; border-color: #c40812; }
    
    /* ===== مشغل الفيديو الخام ===== */
    .raw-video-player {
      width: 100%;
      height: 100%;
      background: #000;
      display: block;
    }
    .raw-video-player::-webkit-media-controls {
      background: rgba(0,0,0,0.7);
    }
  </style>
</head>
<body>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const firebaseConfig = {
      apiKey: "AIzaSyDttyEjbuC6gzHxuN0IR8yi_9fO-aFyW64",
      authDomain: "studio-4914109762-6a41f.firebaseapp.com",
      databaseURL: "https://studio-4914109762-6a41f-default-rtdb.firebaseio.com",
      projectId: "studio-4914109762-6a41f",
      storageBucket: "studio-4914109762-6a41f.firebasestorage.app",
      messagingSenderId: "134781295069",
      appId: "1:134781295069:web:3c020f46f8fbeaca24fe34"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let username = '';
    let userRef, messagesRef, onlineRef, pinnedVideoRef;
    let serverTimeOffset = 0;
    let videoPlayerInstance = null;
    let currentVideoIndex = 0;
    let currentVideosList = [];
    let currentVideoUrl = '';
    let currentVideoType = '';
    let reconnectAttempts = 0;
    const MAX_RECONNECT_ATTEMPTS = 5;
    let reconnectTimer = null;
    let isReconnecting = false;
    let hlsInstance = null;
    let rawVideoElement = null;
    let connectionCheckInterval = null;

    const loginScreen = document.getElementById('loginScreen');
    const usernameInput = document.getElementById('usernameInput');
    const loginBtn = document.getElementById('loginBtn');
    const chatContainer = document.getElementById('chat-container');
    const messagesDiv = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");
    const onlineListBtn = document.getElementById("onlineListBtn");
    const setVideoBtn = document.getElementById("setVideoBtn");
    const usersBox = document.getElementById("usersBox");
    const setVideoModal = document.getElementById("setVideoModal");
    const videoUrlInput = document.getElementById("videoUrlInput");
    const submitVideoUrlBtn = document.getElementById("submitVideoUrlBtn");
    const pinnedVideoPlayer = document.getElementById("pinnedVideoPlayer");
    const overlay = document.getElementById("overlay");

    function escapeHtml(unsafe) { 
      if(!unsafe) return ""; 
      return unsafe.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); 
    }
    function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }

    function getYoutubeVideoId(url) {
      if (!url) return null;
      const regex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
      return (url.match(regex) || [])[1] || null;
    }
    function getTweetId(url) {
      if (!url) return null;
      const regex = /(?:https?:\/\/)?(?:www\.)?(?:twitter|x)\.com\/(?:\w+)\/status\/(\d+)/;
      return (url.match(regex) || [])[1] || null;
    }
    function isDirectVideo(url) {
      return /\.(mp4|webm|ogv|m3u8|m3u)$/i.test(url);
    }

    // ===== حالة الاتصال =====
    function showConnectionStatus(message, type = 'connected') {
      const statusEl = document.querySelector('.connection-status');
      if (!statusEl) return;
      statusEl.textContent = message;
      statusEl.className = `connection-status show ${type}`;
      clearTimeout(statusEl._timeout);
      if (type === 'connected') {
        statusEl._timeout = setTimeout(() => statusEl.classList.remove('show'), 3000);
      }
    }

    // ===== تشغيل البث الخام (Raw Stream) مباشرة =====
    function playRawStream(container, url) {
      // تنظيف أي مشغل سابق
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }
      if (videoPlayerInstance) {
        videoPlayerInstance.dispose();
        videoPlayerInstance = null;
      }
      if (rawVideoElement) {
        rawVideoElement.pause();
        rawVideoElement.remove();
        rawVideoElement = null;
      }
      if (connectionCheckInterval) {
        clearInterval(connectionCheckInterval);
        connectionCheckInterval = null;
      }

      // إنشاء عنصر فيديو عادي
      const videoEl = document.createElement('video');
      videoEl.className = 'raw-video-player';
      videoEl.controls = true;
      videoEl.autoplay = true;
      videoEl.muted = true;
      videoEl.playsinline = true;
      videoEl.style.width = '100%';
      videoEl.style.height = '100%';
      videoEl.style.background = '#000';
      
      // تعيين المصدر
      videoEl.src = url;
      videoEl.load();

      // إضافة حالة الاتصال
      const statusDiv = document.createElement('div');
      statusDiv.className = 'connection-status';
      statusDiv.textContent = '⏳ جاري التحميل...';
      container.appendChild(statusDiv);
      
      // إضافة الفيديو
      container.appendChild(videoEl);
      rawVideoElement = videoEl;

      // محاولة التشغيل
      videoEl.play().catch(() => {
        showConnectionStatus('⚠️ اضغط تشغيل للمتابعة', 'reconnecting');
      });

      // مراقبة الأخطاء
      videoEl.addEventListener('error', (e) => {
        console.error('خطأ في البث:', e);
        if (videoEl.networkState === 2 || videoEl.networkState === 3) {
          showConnectionStatus('⚠️ انقطاع البث، جاري إعادة المحاولة...', 'reconnecting');
          if (!isReconnecting) {
            scheduleReconnectRaw(videoEl, url);
          }
        }
      });

      // مراقبة التوقف
      videoEl.addEventListener('stalled', () => {
        if (!videoEl.paused && videoEl.readyState < 3) {
          showConnectionStatus('⚠️ توقف البث، جاري الاسترداد...', 'reconnecting');
          if (!isReconnecting) {
            scheduleReconnectRaw(videoEl, url);
          }
        }
      });

      // مراقبة دورية لحالة الاتصال
      connectionCheckInterval = setInterval(() => {
        if (videoEl.readyState < 2 && !videoEl.paused && !videoEl.ended) {
          showConnectionStatus('⚠️ انقطاع البث...', 'reconnecting');
          if (!isReconnecting) {
            scheduleReconnectRaw(videoEl, url);
          }
        }
      }, 5000);

      // عند نجاح التحميل
      videoEl.addEventListener('loadeddata', () => {
        showConnectionStatus('✅ بث مباشر', 'connected');
        videoEl.play().catch(() => {});
      });

      return videoEl;
    }

    // ===== إعادة الاتصال للبث الخام =====
    function scheduleReconnectRaw(videoElement, url) {
      if (isReconnecting) return;
      if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
        showConnectionStatus('❌ فشل إعادة الاتصال بعد 5 محاولات', 'disconnected');
        return;
      }
      
      isReconnecting = true;
      reconnectAttempts++;
      const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 30000);
      
      showConnectionStatus(`⏳ إعادة محاولة (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})...`, 'reconnecting');
      
      if (reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => {
        try {
          // إعادة تحميل المصدر
          videoElement.src = url + '?t=' + Date.now();
          videoElement.load();
          videoElement.play().catch(() => {});
          
          isReconnecting = false;
          reconnectAttempts = 0;
          showConnectionStatus('✅ تمت إعادة الاتصال', 'connected');
        } catch (e) {
          isReconnecting = false;
          scheduleReconnectRaw(videoElement, url);
        }
      }, delay);
    }

    // ===== إعادة تحميل البث =====
    function reloadRawStream(videoElement, url) {
      if (!videoElement) return;
      showConnectionStatus('🔄 جاري تحديث البث...', 'reconnecting');
      reconnectAttempts = 0;
      isReconnecting = false;
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      
      videoElement.src = url + '?t=' + Date.now();
      videoElement.load();
      videoElement.play().catch(() => {});
      showConnectionStatus('✅ تم تحديث البث', 'connected');
    }

    // ===== تشغيل HLS عبر hls.js =====
    function playHlsStream(container, url) {
      // تنظيف
      if (rawVideoElement) {
        rawVideoElement.pause();
        rawVideoElement.remove();
        rawVideoElement = null;
      }
      if (videoPlayerInstance) {
        videoPlayerInstance.dispose();
        videoPlayerInstance = null;
      }
      if (connectionCheckInterval) {
        clearInterval(connectionCheckInterval);
        connectionCheckInterval = null;
      }

      const videoEl = document.createElement('video');
      videoEl.className = 'raw-video-player';
      videoEl.controls = true;
      videoEl.autoplay = true;
      videoEl.muted = true;
      videoEl.playsinline = true;
      videoEl.style.width = '100%';
      videoEl.style.height = '100%';
      videoEl.style.background = '#000';
      
      const statusDiv = document.createElement('div');
      statusDiv.className = 'connection-status';
      statusDiv.textContent = '⏳ جاري تحميل البث...';
      container.appendChild(statusDiv);
      
      container.appendChild(videoEl);
      rawVideoElement = videoEl;

      if (Hls.isSupported()) {
        const hls = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
          backbufferLength: 30,
          maxBufferLength: 30,
          liveSyncDuration: 3,
          liveMaxLatencyDuration: 10,
        });
        hlsInstance = hls;
        hls.loadSource(url);
        hls.attachMedia(videoEl);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          showConnectionStatus('✅ بث HLS', 'connected');
          videoEl.play().catch(() => {});
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              showConnectionStatus('⚠️ انقطاع الشبكة، محاولة إعادة الاتصال...', 'reconnecting');
              if (!isReconnecting) {
                scheduleReconnectRaw(videoEl, url);
              }
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              hls.recoverMediaError();
            }
          }
        });
      } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
        videoEl.src = url;
        videoEl.load();
        videoEl.play().catch(() => {});
      }

      return videoEl;
    }

    // ===== إنشاء مشغل الفيديو حسب النوع =====
    function createVideoPlayer(container, videoSource, videoType, isYoutube) {
      // تنظيف شامل
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }
      if (videoPlayerInstance) {
        videoPlayerInstance.dispose();
        videoPlayerInstance = null;
      }
      if (rawVideoElement) {
        rawVideoElement.pause();
        rawVideoElement.remove();
        rawVideoElement = null;
      }
      if (connectionCheckInterval) {
        clearInterval(connectionCheckInterval);
        connectionCheckInterval = null;
      }
      reconnectAttempts = 0;
      isReconnecting = false;
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }

      container.innerHTML = '';

      // يوتيوب
      if (isYoutube) {
        const videoEl = document.createElement('video-js');
        videoEl.className = 'vjs-netflix-theme';
        container.appendChild(videoEl);
        
        videoPlayerInstance = videojs(videoEl, {
          autoplay: true,
          muted: true,
          controls: true,
          aspectRatio: '16:9',
          playsinline: true,
          techOrder: ['youtube'],
          sources: [{ type: 'video/youtube', src: videoSource }]
        });
        return videoPlayerInstance;
      }

      // روابط HLS (.m3u8)
      if (videoType === 'application/x-mpegURL' || videoSource.includes('.m3u8') || videoSource.includes('.m3u')) {
        return playHlsStream(container, videoSource);
      }

      // روابط خام (Raw) - تحتوي على /play/ أو مفتاح طويل
      if (videoSource.includes('/play/') || videoSource.match(/[a-zA-Z0-9_-]{40,}/)) {
        return playRawStream(container, videoSource);
      }

      // فيديو مباشر عادي (MP4, WebM)
      const videoEl = document.createElement('video');
      videoEl.className = 'raw-video-player';
      videoEl.controls = true;
      videoEl.autoplay = true;
      videoEl.muted = true;
      videoEl.playsinline = true;
      videoEl.style.width = '100%';
      videoEl.style.height = '100%';
      videoEl.style.background = '#000';
      videoEl.src = videoSource;
      videoEl.load();
      
      container.appendChild(videoEl);
      rawVideoElement = videoEl;
      
      videoEl.play().catch(() => {});
      
      // مراقبة الأخطاء
      videoEl.addEventListener('error', () => {
        if (videoEl.networkState === 2) {
          showConnectionStatus('⚠️ انقطاع البث...', 'reconnecting');
          if (!isReconnecting) {
            scheduleReconnectRaw(videoEl, videoSource);
          }
        }
      });
      
      return videoEl;
    }

    // ===== دوال الشات =====
    function addMessageToUI(key, { user, text, time, timestamp }) {
      const div = document.createElement("div");
      div.className = "msg";
      div.id = `msg-${key}`;
      
      const timeElement = document.createElement("span");
      timeElement.className = "time";
      timeElement.id = `time-${key}`;
      
      updateTimeDisplay(key, timestamp, timeElement);
      
      div.innerHTML = `
        <span class="user">${escapeHtml(user)}</span>
        <span style="flex:1; word-break: break-word;">${escapeHtml(text)}</span>
      `;
      
      div.appendChild(timeElement);
      messagesDiv.appendChild(div);
      scrollToBottom();
      
      setInterval(() => { updateTimeDisplay(key, timestamp, timeElement); }, 60000);
    }

    function updateTimeDisplay(key, timestamp, timeElement) {
      if (!timestamp) return;
      const now = Date.now() + serverTimeOffset;
      const messageTime = timestamp + serverTimeOffset;
      const diffMs = now - messageTime;
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHours = Math.floor(diffMin / 60);
      const diffDays = Math.floor(diffHours / 24);
      const diffWeeks = Math.floor(diffDays / 7);
      const diffMonths = Math.floor(diffDays / 30);
      const diffYears = Math.floor(diffDays / 365);
      
      let timeText = "";
      if (diffSec < 5) timeText = "الآن";
      else if (diffSec < 60) timeText = "ثواني";
      else if (diffMin < 2) timeText = "د1";
      else if (diffMin < 60) timeText = `د${diffMin}`;
      else if (diffHours < 24) timeText = `س${diffHours}`;
      else if (diffDays < 7) timeText = `ي${diffDays}`;
      else if (diffWeeks < 4) timeText = `أ${diffWeeks}`;
      else if (diffMonths < 12) timeText = `ش${diffMonths}`;
      else timeText = `ع${diffYears}`;
      timeElement.textContent = timeText;
    }

    function addNotification(text) {
      const div = document.createElement("div");
      div.className = "sys";
      div.textContent = text;
      messagesDiv.appendChild(div);
      scrollToBottom();
    }

    function renderUsersList(users) {
      const list = document.getElementById("usersList");
      list.innerHTML = '';
      const now = Date.now() + serverTimeOffset;
      Object.keys(users).forEach(uName => {
        const uData = users[uName];
        const div = document.createElement("div");
        div.className = "user-item";
        let colorClass = 'status-green';
        const diff = now - (uData.lastActive || 0);
        if (diff > 60000) colorClass = 'status-gray';
        else if (diff > 30000) colorClass = 'status-yellow';
        div.innerHTML = `<span class="status-indicator ${colorClass}"></span><span>${escapeHtml(uName)}</span>`;
        list.appendChild(div);
      });
    }

    function closeAllModals() {
      usersBox.style.display = 'none';
      setVideoModal.style.display = 'none';
      overlay.style.display = 'none';
    }

    function makeDraggable(element, handle) {
      let offsetX = 0, offsetY = 0;
      let isDragging = false;
      const getPointerPosition = (e) => e.touches ? e.touches[0] : e;
      const onDragStart = (e) => {
        isDragging = true;
        const pointer = getPointerPosition(e);
        offsetX = pointer.clientX - element.offsetLeft;
        offsetY = pointer.clientY - element.offsetTop;
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('touchmove', onDragMove, { passive: false });
        document.addEventListener('mouseup', onDragEnd);
        document.addEventListener('touchend', onDragEnd);
      };
      const onDragMove = (e) => {
        if (isDragging) {
          e.preventDefault();
          const pointer = getPointerPosition(e);
          element.style.left = (pointer.clientX - offsetX) + "px";
          element.style.top = (pointer.clientY - offsetY) + "px";
        }
      };
      const onDragEnd = () => {
        isDragging = false;
        document.removeEventListener('mousemove', onDragMove);
        document.removeEventListener('touchmove', onDragMove);
        document.removeEventListener('mouseup', onDragEnd);
        document.removeEventListener('touchend', onDragEnd);
      };
      handle.addEventListener('mousedown', onDragStart);
      handle.addEventListener('touchstart', onDragStart, { passive: false });
    }

    function makeResizable(element, handle) {
      let initialWidth, initialHeight, initialX, initialY;
      const getPointerPosition = (e) => e.touches ? e.touches[0] : e;
      function onResizeStart(e) {
        if(e.type === 'touchstart') e.preventDefault();
        const pointer = getPointerPosition(e);
        initialWidth = element.offsetWidth;
        initialHeight = element.offsetHeight;
        initialX = pointer.clientX;
        initialY = pointer.clientY;
        document.addEventListener('mousemove', onResizeMove);
        document.addEventListener('touchmove', onResizeMove, { passive: false });
        document.addEventListener('mouseup', onResizeEnd);
        document.addEventListener('touchend', onResizeEnd);
      }
      function onResizeMove(e) {
        if(e.type === 'touchmove') e.preventDefault();
        const pointer = getPointerPosition(e);
        const newWidth = initialWidth + (pointer.clientX - initialX);
        const newHeight = initialHeight + (pointer.clientY - initialY);
        if (newWidth > 300) { element.style.width = newWidth + 'px'; }
        if (newHeight > 200) { element.style.height = newHeight + 'px'; }
      }
      function onResizeEnd() {
        document.removeEventListener('mousemove', onResizeMove);
        document.removeEventListener('touchmove', onResizeMove);
        document.removeEventListener('mouseup', onResizeEnd);
        document.removeEventListener('touchend', onResizeEnd);
      }
      handle.addEventListener('mousedown', onResizeStart);
      handle.addEventListener('touchstart', onResizeStart, { passive: false });
    }

    // ===== تسجيل الدخول =====
    function attemptLogin() {
      let inputName = usernameInput.value.trim();
      const invalidChars = /[.#$\\[\\]]/;
      if (invalidChars.test(inputName)) { alert("الاسم لا يجب أن يحتوي على رموز خاصة"); return; }
      if (inputName.length < 2) { alert("الاسم قصير جداً"); return; }
      username = inputName;
      userRef = db.ref("online/" + username);
      messagesRef = db.ref("messages");
      onlineRef = db.ref("online");
      pinnedVideoRef = db.ref("pinned_video");
      startChat();
    }

    loginBtn.onclick = attemptLogin;
    usernameInput.onkeypress = (e) => { if (e.key === 'Enter') attemptLogin(); };

    // ===== تشغيل الشات =====
    function startChat() {
      loginScreen.style.display = 'none';
      chatContainer.style.display = 'flex';

      db.ref('.info/serverTimeOffset').on('value', snap => serverTimeOffset = snap.val() || 0);

      userRef.set({ lastActive: firebase.database.ServerValue.TIMESTAMP });
      userRef.onDisconnect().remove();

      setInterval(() => {
        userRef.update({ lastActive: firebase.database.ServerValue.TIMESTAMP });
      }, 60000);

      setInterval(() => {
         const now = Date.now() + serverTimeOffset;
         onlineRef.once('value', snap => {
             snap.forEach(child => {
                 if (now - child.val().lastActive > 90000) child.ref.remove();
             });
         });
      }, 60000);

      onlineListBtn.onclick = (e) => { e.stopPropagation(); usersBox.style.display = 'block'; overlay.style.display = 'block'; };
      setVideoBtn.onclick = (e) => { e.stopPropagation(); setVideoModal.style.display = 'block'; overlay.style.display = 'block'; };
      overlay.onclick = closeAllModals;
      
      document.getElementById("inputArea").onsubmit = (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (!text) return;
        const time = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit', hour12: false});
        messagesRef.push({ user: username, text: text, time: time, timestamp: firebase.database.ServerValue.TIMESTAMP });
        messageInput.value = "";
        userRef.update({ lastActive: firebase.database.ServerValue.TIMESTAMP });
        scrollToBottom();
      };

      messagesRef.limitToLast(100).on("child_added", snap => addMessageToUI(snap.key, snap.val()));
      messagesRef.on("child_removed", snap => {
        const msgElement = document.getElementById(`msg-${snap.key}`);
        if (msgElement) { msgElement.style.opacity = '0'; setTimeout(() => msgElement.remove(), 300); }
      });

      onlineRef.on("value", snap => {
        document.getElementById("count").textContent = snap.numChildren();
        renderUsersList(snap.val() || {});
      });

      // ===== معالجة تثبيت الفيديو =====
      submitVideoUrlBtn.onclick = () => {
        const url = videoUrlInput.value.trim();
        if (!url) return;
        const youtubeId = getYoutubeVideoId(url);
        const tweetId = getTweetId(url);
        
        if (youtubeId) {
          pinnedVideoRef.set({ type: 'youtube', id: youtubeId, setBy: username });
        } else if (tweetId) {
          pinnedVideoRef.set({ type: 'twitter', id: tweetId, setBy: username });
        } else if (url.toLowerCase().includes('.m3u') || url.toLowerCase().includes('.m3u8')) {
          pinnedVideoRef.set({ type: 'hls', url: url, setBy: username });
        } else if (isDirectVideo(url)) {
          pinnedVideoRef.set({ type: 'direct', url: url, setBy: username });
        } else if (url.includes('/play/') || url.match(/[a-zA-Z0-9_-]{40,}/)) {
          // الروابط الخام مثل رابط VLC
          pinnedVideoRef.set({ type: 'raw', url: url, setBy: username });
        } else {
          alert("الرابط غير مدعوم.");
          return;
        }
        videoUrlInput.value = "";
        closeAllModals();
      };

      // ===== مراقبة التغيير في الفيديو المثبت =====
      pinnedVideoRef.on("value", async (snap) => {
        const data = snap.val();
        
        // تنظيف شامل
        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }
        if (videoPlayerInstance) {
          videoPlayerInstance.dispose();
          videoPlayerInstance = null;
        }
        if (rawVideoElement) {
          rawVideoElement.pause();
          rawVideoElement.remove();
          rawVideoElement = null;
        }
        if (connectionCheckInterval) {
          clearInterval(connectionCheckInterval);
          connectionCheckInterval = null;
        }
        reconnectAttempts = 0;
        isReconnecting = false;
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        
        pinnedVideoPlayer.innerHTML = '';
        currentVideosList = [];
        currentVideoIndex = 0;

        if (data) {
          pinnedVideoPlayer.style.display = 'flex';
          const header = document.createElement('div');
          header.className = 'video-header';
          header.innerHTML = `<span>📺 بث مباشر - ${data.setBy}</span>`;
          
          const controlsDiv = document.createElement('div');
          controlsDiv.className = 'header-controls';
          
          const reloadBtn = document.createElement('button');
          reloadBtn.className = 'reload-btn';
          reloadBtn.innerHTML = '🔄';
          reloadBtn.title = 'تحديث البث';
          reloadBtn.onclick = (e) => {
            e.stopPropagation();
            const videoEl = pinnedVideoPlayer.querySelector('video');
            if (videoEl) {
              const src = videoEl.src || currentVideoUrl;
              if (src) {
                reloadRawStream(videoEl, src);
              }
            }
          };
          controlsDiv.appendChild(reloadBtn);
          
          const closeBtn = document.createElement('button');
          closeBtn.className = 'close-pinned-video';
          closeBtn.innerHTML = '✖';
          closeBtn.onclick = () => pinnedVideoRef.remove();
          controlsDiv.appendChild(closeBtn);
          
          header.appendChild(controlsDiv);
          
          const body = document.createElement('div');
          body.className = 'video-body';
          
          const resizeHandle = document.createElement('div');
          resizeHandle.className = 'resize-handle';
          
          pinnedVideoPlayer.appendChild(header);
          pinnedVideoPlayer.appendChild(body);
          pinnedVideoPlayer.appendChild(resizeHandle);
          
          makeDraggable(pinnedVideoPlayer, header);
          makeResizable(pinnedVideoPlayer, resizeHandle);

          if (data.type === 'youtube') {
            currentVideoUrl = `https://www.youtube.com/watch?v=${data.id}`;
            currentVideoType = 'video/youtube';
            createVideoPlayer(body, currentVideoUrl, 'video/youtube', true);
          } else if (data.type === 'hls') {
            currentVideoUrl = data.url;
            currentVideoType = 'application/x-mpegURL';
            createVideoPlayer(body, currentVideoUrl, 'application/x-mpegURL', false);
          } else if (data.type === 'raw') {
            currentVideoUrl = data.url;
            currentVideoType = 'video/raw';
            createVideoPlayer(body, currentVideoUrl, 'video/raw', false);
          } else if (data.type === 'direct') {
            currentVideoUrl = data.url;
            currentVideoType = 'video/mp4';
            createVideoPlayer(body, currentVideoUrl, 'video/mp4', false);
          } else if (data.type === 'twitter') {
            const videos = await fetchTwitterVideos(data.id);
            if (!videos || !videos.length) {
              body.innerHTML = `<p style="color:white;padding:10px;">تعذر جلب فيديو تويتر (قد يكون خاصاً أو محذوفاً).</p>`;
            } else {
              currentVideosList = videos;
              currentVideoIndex = 0;
              currentVideoUrl = videos[0].url;
              currentVideoType = 'video/mp4';
              createVideoPlayer(body, currentVideoUrl, 'video/mp4', false);
              if (videos.length > 1) {
                createVideoSelector(body, videos);
              }
            }
          }
          addNotification(`${data.setBy} قام بتشغيل فيديو`);
        } else {
          pinnedVideoPlayer.style.display = 'none';
        }
      });
    }

    // ===== دوال إضافية =====
    function createVideoSelector(container, videos) {
      const selectorBar = document.createElement('div');
      selectorBar.className = 'video-selector-bar';

      videos.forEach((v, idx) => {
        const btn = document.createElement('button');
        btn.className = 'video-selector-btn';
        btn.textContent = `مقطع ${idx + 1}`;
        if (idx === 0) btn.classList.add('active');
        
        btn.onclick = (e) => {
          e.preventDefault();
          if (idx !== currentVideoIndex) {
            currentVideoIndex = idx;
            // تنظيف وإعادة تشغيل
            if (rawVideoElement) {
              rawVideoElement.pause();
              rawVideoElement.remove();
              rawVideoElement = null;
            }
            createVideoPlayer(container, v.url, 'video/mp4', false);
            document.querySelectorAll('.video-selector-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          }
        };
        selectorBar.appendChild(btn);
      });

      container.appendChild(selectorBar);
    }

    async function fetchTwitterVideos(tweetId) {
      const videos = [];
      try {
        const fxRes = await fetch(`https://api.fxtwitter.com/status/${tweetId}`);
        if (fxRes.ok) {
          const fxData = await fxRes.json();
          const tweet = fxData.tweet || {};
          const media = tweet.media || {};
          if (Array.isArray(media.videos)) {
            media.videos.forEach(v => { if (v && v.url) videos.push({ url: v.url, thumb: v.thumbnail_url || '', type: v.type || 'video', provider: 'fxtwitter' }); });
          } else if (Array.isArray(media.all)) {
            media.all.filter(m => m.type === 'video' || m.type === 'gif').forEach(v => { if (v && v.url) videos.push({ url: v.url, thumb: v.thumbnail_url || '', type: v.type || 'video', provider: 'fxtwitter' }); });
          }
        }
      } catch (e) { console.warn('FixTweet error:', e); }

      if (!videos.length) {
        try {
          const vxRes = await fetch(`https://api.vxtwitter.com/i/status/${tweetId}`);
          if (vxRes.ok) {
            const vxData = await vxRes.json();
            const mediaExt = vxData.media_extended || [];
            mediaExt.forEach(m => { if (m && m.url) videos.push({ url: m.url, thumb: m.thumbnail_url || '', type: m.type || 'video', provider: 'vxtwitter' }); });
          }
        } catch (e) { console.warn('vxtwitter error:', e); }
      }
      return videos;
    }
  });
</script>
